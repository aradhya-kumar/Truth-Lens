<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TruthLens</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="bg"></div>

    <div class="container">

        <!-- HEADER -->
        <h1 class="title">TruthLens 🔍</h1>
        <p class="subtitle">AI-Powered Deepfake Detection</p>

        <!-- UPLOAD BOX -->
        <form method="POST" enctype="multipart/form-data" class="upload-box" id="uploadForm">

            <div class="drop-zone" id="dropZone">
                <p>Drag & Drop file here</p>
                <span>or click to upload</span>
                <input type="file" name="file" id="fileInput" required hidden>
            </div>

            <button type="submit" class="btn">Analyze</button>
        </form>

        <!-- LOADING -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing...</p>
        </div>

        <!-- RESULT -->
        {% if result %}
        <div class="card">
            <h2 class="result {{ result|lower }}">{{ result }}</h2>

            <!-- Confidence -->
            <div class="confidence-bar">
                <div class="fill" style="width: {{ confidence * 100 }}%"></div>
            </div>
            <p class="confidence-text">{{ "%.2f"|format(confidence * 100) }}%</p>

            <!-- Preview -->
            {% if file_type == "image" %}
            <img src="{{ file }}" class="preview">
            {% elif file_type == "video" %}
            <video controls class="preview">
                <source src="{{ file }}">
            </video>
            {% endif %}
        </div>
        {% endif %}

        <!-- FOOTER -->
        <div class="footer">
            <p>Built with ❤️ using TensorFlow & Flask</p>
        </div>

    </div>

    <script>
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const form = document.getElementById("uploadForm");
        const loading = document.getElementById("loading");

        // Click upload
        dropZone.addEventListener("click", () => fileInput.click());

        // Drag over
        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        // Drag leave
        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        // Drop
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            fileInput.files = e.dataTransfer.files;
            dropZone.classList.remove("dragover");
        });

        // Show loading
        form.addEventListener("submit", () => {
            loading.classList.remove("hidden");
        });
    </script>

</body>

</html>
